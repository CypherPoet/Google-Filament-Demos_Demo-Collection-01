# Netlify configuration for the Filament Demo Lab showcase site.
# The mobile app under /mobile is NOT built or deployed here — only the Astro
# site under /site is published.

[build]
  base = "site"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the hashed, immutable assets Astro emits.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA-style fallback is unnecessary for a static multi-file site, but a 404 is
# served from Astro's own 404 page automatically.
